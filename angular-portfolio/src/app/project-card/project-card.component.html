<article class="project-card" [class.is-placeholder]="isPlaceholder">
  <div class="card-media">
    <img
      [src]="project.image"
      [alt]="project.title"
      class="card-img"
      [style.object-position]="project.imageAlign || 'center'"
      loading="lazy"
    />
    <span class="card-category" [attr.data-cat]="project.category">
      {{ categoryLabel }}
    </span>
    <div class="card-scrim" aria-hidden="true"></div>
  </div>

  <div class="card-body">
    <p
      *ngIf="project.projectType || project.year"
      class="card-eyebrow"
    >
      <span *ngIf="project.projectType">{{ project.projectType }}</span>
      <span *ngIf="project.projectType && project.year" class="dot"
        aria-hidden="true">·</span>
      <span *ngIf="project.year">{{ project.year }}</span>
    </p>

    <h3 class="card-title">{{ project.title }}</h3>

    <p *ngIf="project.description" class="card-desc">
      {{ project.description }}
    </p>

    <ul *ngIf="project.tech?.length" class="card-tech" role="list">
      <li class="tech-pill" *ngFor="let t of project.tech">{{ t }}</li>
    </ul>
  </div>

  <div class="card-footer" *ngIf="!isPlaceholder">
    <a
      [href]="project.link"
      target="_blank"
      rel="noopener noreferrer"
      class="card-link"
      [attr.aria-label]="(project.overlay || 'View project') + ': ' + project.title"
    >
      {{ project.overlay || 'View Project' }}
      <span class="card-link-arrow" aria-hidden="true">→</span>
    </a>
  </div>

  <div class="card-footer card-footer--muted" *ngIf="isPlaceholder">
    <span class="card-link card-link--disabled">
      {{ project.overlay || 'Coming Soon' }}
    </span>
  </div>
</article>
